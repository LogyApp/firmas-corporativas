<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Firmas - Logyser</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #1F2E3A;
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header img {
            width: 220px;
        }

        .header h2 {
            margin: 12px 0 0 0;
            font-size: 20px;
            color: #1F2E3A;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 7px;
            font-size: 13px;
        }

        input,
        select {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            font-family: 'Montserrat', sans-serif;
        }

        input[disabled] {
            background-color: #eee;
            cursor: not-allowed;
        }

        .btn {
            background: #E8762B;
            color: white;
            padding: 14px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 800;
            font-size: 15px;
            width: 100%;
            transition: background 0.3s;
            font-family: 'Montserrat', sans-serif;
        }

        .btn:hover {
            background: #c9601a;
        }

        .btn-copy {
            background: #1C1C1E;
            margin-top: 12px;
        }

        .btn-copy:hover {
            background: #333;
        }

        .hidden {
            display: none;
        }

        #preview {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            background: #e8ecf0;
        }

        #preview h3 {
            margin: 0 0 14px 0;
            font-size: 15px;
            color: #1F2E3A;
        }

        .required::after {
            content: " *";
            color: #E8762B;
        }

        .tipo-firma-group {
            display: flex;
            gap: 24px;
            margin-top: 4px;
        }

        .tipo-firma-group label {
            font-weight: 400;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 0;
        }

        .tipo-firma-group input[type="radio"] {
            width: auto;
            padding: 0;
            cursor: pointer;
        }

        .firma-preview-wrap {
            overflow-x: auto;
            padding-bottom: 6px;
        }

        .status-msg {
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
        }

        .status-msg.error {
            background: #fff0f0;
            color: #c0392b;
            border: 1px solid #e0b0b0;
            display: block;
        }

        .status-msg.success {
            background: #f0fff4;
            color: #1a7a40;
            border: 1px solid #a0d8b0;
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <img src="https://storage.googleapis.com/logyser-recibo-public/Logyser%20sin%20Nit.png" alt="LOG &amp; SER">
            <h2>Generador de Firma Corporativa</h2>
        </div>

        <div class="form-group">
            <label class="required">Identificación (Cédula)</label>
            <input type="number" id="identificacion" placeholder="Ingrese su cédula y presione Enter"
                onkeypress="handleEnter(event)">
        </div>

        <div id="formulario-detalle" class="hidden">
            <div class="form-group">
                <label>Trabajador (Informativo)</label>
                <input type="text" id="trabajador" disabled>
            </div>

            <div class="form-group">
                <label class="required">Nombre para la firma</label>
                <input type="text" id="nombre" required>
            </div>

            <div class="form-group">
                <label class="required">Cargo</label>
                <input type="text" id="cargo" required>
            </div>

            <div class="form-group">
                <label class="required">Sede</label>
                <input type="text" id="operacion" disabled>
            </div>

            <div class="form-group">
                <label>Dirección o ubicación donde labora</label>
                <input type="text" id="direccion" placeholder="Ej: Carrera 9 #13-28, Piso 2, Chía">
            </div>

            <div class="form-group">
                <label class="required">Correo electrónico corporativo</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label class="required">Teléfono corporativo</label>
                <input type="text" id="celular" required placeholder="Ej: 3155565490">
            </div>

            <div class="form-group">
                <label>Foto para la agenda corporativa (opcional)</label>
                <input type="file" id="foto" accept="image/*">
            </div>

            <div id="statusMsg" class="status-msg"></div>

            <button class="btn" onclick="guardarDatos()">GUARDAR Y GENERAR FIRMA</button>
        </div>

        <div id="preview" class="hidden">
            <h3>Vista previa de tu firma:</h3>
            <div class="firma-preview-wrap">
                <div id="signature-render"></div>
            </div>
            <button class="btn btn-copy" onclick="copyToClipboard()">COPIAR FIRMA PARA CORREO</button>
            <p style="font-size:11px; color:#888; margin:8px 0 0 0; text-align:center;">
                Pega la firma directamente en la configuración de tu cliente de correo (Gmail, Outlook, etc.)
            </p>
        </div>
    </div>

    <script>
        const Url = 'https://firmas-corporativas-594761951101.europe-west1.run.app';

        async function handleEnter(e) {
            if (e.key !== 'Enter') return;
            const id = document.getElementById('identificacion').value;
            if (!id) return;

            try {
                const res = await fetch(`${Url}/api/empleado/${id}`);
                const result = await res.json();

                document.getElementById('formulario-detalle').classList.remove('hidden');

                if (result.exists && result.data) {
                    const d = result.data;
                    document.getElementById('trabajador').value = d.Trabajador || 'Dato no disponible';
                    document.getElementById('nombre').value = d.nombre || '';
                    document.getElementById('cargo').value = d.cargo || '';
                    document.getElementById('operacion').value = d.operacion || 'Administracion';
                    document.getElementById('direccion').value = d.direccion || '';
                    document.getElementById('email').value = d.email || '';
                    document.getElementById('celular').value = d.celular || '';
                    document.getElementById('formulario-detalle').dataset.area = d.area || 'auxiliares';
                    document.getElementById('formulario-detalle').dataset.fotoUrl = d.foto_url || '';
                } else {
                    document.getElementById('trabajador').value = 'Nuevo Registro';
                    document.getElementById('operacion').value = 'Administracion';
                    document.getElementById('formulario-detalle').dataset.area = 'auxiliares';
                    document.getElementById('formulario-detalle').dataset.fotoUrl = '';
                    ['nombre', 'cargo', 'direccion', 'email', 'celular'].forEach(f =>
                        document.getElementById(f).value = ''
                    );
                }
            } catch (err) {
                showStatus('Error al consultar el empleado. Verifique su conexión.', 'error');
            }
        }

        async function guardarDatos() {
            const btn = document.querySelector('.btn');
            const id = document.getElementById('identificacion').value;
            const area = document.getElementById('formulario-detalle').dataset.area || 'auxiliares';

            const campos = ['nombre', 'cargo', 'operacion', 'email', 'celular'];
            for (let campo of campos) {
                if (!document.getElementById(campo).value.trim()) {
                    showStatus(`El campo "${campo}" es obligatorio.`, 'error');
                    return;
                }
            }

            try {
                btn.innerText = 'PROCESANDO...';
                btn.disabled = true;
                hideStatus();

                const formData = new FormData();
                formData.append('Identificacion', id);
                formData.append('nombre', document.getElementById('nombre').value.trim());
                formData.append('cargo', document.getElementById('cargo').value.trim());
                formData.append('operacion', document.getElementById('operacion').value.trim());
                formData.append('direccion', document.getElementById('direccion').value.trim());
                formData.append('email', document.getElementById('email').value.trim());
                formData.append('celular', document.getElementById('celular').value.trim());
                formData.append('area', area);

                const fotoFile = document.getElementById('foto').files[0];
                if (fotoFile) formData.append('foto', fotoFile);

                const res = await fetch(`${Url}/api/guardar`, { method: 'POST', body: formData });
                const result = await res.json();

                if (result.success) {
                    renderFirma();
                    showStatus('¡Firma generada correctamente!', 'success');
                } else {
                    showStatus('Error al guardar los datos: ' + (result.error || 'Intente de nuevo.'), 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('Error al procesar la firma. Verifique su conexión.', 'error');
            } finally {
                btn.innerText = 'GUARDAR Y GENERAR FIRMA';
                btn.disabled = false;
            }
        }

function renderFirma() {
            const nombre = document.getElementById('nombre').value.trim();
            const cargo = document.getElementById('cargo').value.trim();
            const operacion = document.getElementById('operacion').value.trim();
            const direccion = document.getElementById('direccion').value.trim();
            const email = document.getElementById('email').value.trim();
            const celular = document.getElementById('celular').value.trim();

            const logoUrl = 'https://storage.googleapis.com/logyser-recibo-public/Logyser%20sin%20Nit.png';

            // --- AJUSTES DE ESTILO ---
            
            // 1. Nuevo Color Azul Corporativo para textos
            const azulCorporativo = "#1A2E44"; 
            
            // Estilo base para textos de contacto con el nuevo azul
            const textStyle = `margin:0 0 2px 0;font-size:12px;color:${azulCorporativo};font-family:Arial,Helvetica,sans-serif;`;
            
            // 2. Tamaño del Logo (Original: 220px + 40% = 308px)
            const nuevoAnchoLogo = "308";

            // --- CONSTRUCCIÓN DEL HTML DE LA FIRMA ---

            const direccionHtml = direccion
                ? `<p style="${textStyle}">${direccion}</p>`
                : '';
            const operacionHtml = operacion
                ? `<p style="${textStyle}">${operacion}</p>`
                : '';

            const htmlFirma = `
<table cellpadding="0" cellspacing="0" border="0" style="font-family:Arial,Helvetica,sans-serif;max-width:480px;width:480px;background-color:#FFFFFF;">
  <tr>
    <td style="padding:16px 20px 12px 20px;border:1px solid #DDE1E8;border-bottom:none;">
      <p style="margin:0 0 2px 0;font-size:18px;font-weight:700;color:${azulCorporativo};font-family:Arial,Helvetica,sans-serif;">${nombre}</p>
      <p style="margin:0 0 8px 0;font-size:13px;font-weight:600;color:#E8762B;font-family:Arial,Helvetica,sans-serif;">${cargo}</p>
      
      <p style="${textStyle}">
        <span style="color:${azulCorporativo};">Email: </span>
        <a href="mailto:${email}" style="color:#0066CC;text-decoration:none;font-weight:600;">${email}</a>
      </p>
      
      <p style="${textStyle}">Celular: <span style="color:${azulCorporativo};">+57 ${celular}</span></p>
      ${direccionHtml}${operacionHtml}
    </td>
  </tr>
<tr>
    <td style="padding:5px 20px 5px 20px;border-left:1px solid #DDE1E8;border-right:1px solid #DDE1E8;border-bottom:none;text-align:left;">
      <img src="${logoUrl}" alt="LOG &amp; SER" width="${nuevoAnchoLogo}" style="display:block;width:${nuevoAnchoLogo}px;height:auto;margin:0;">
    </td>
  </tr>
  <tr>
    <td style="background-color:#F7F8FA;padding:12px 20px;border:1px solid #DDE1E8;">
      <p style="margin:0;color:#888888;font-size:9px;line-height:1.4;font-family:Arial,Helvetica,sans-serif;text-align:justify;">
        <strong style="color:#666666;">AVISO IMPORTANTE:</strong> Este correo electrónico y cualquier archivo adjunto pueden contener información confidencial y privilegiada. Está destinado a ser recibido únicamente por personas con derecho a recibir la información. Si no es el destinatario previsto, elimínelo de su sistema y notifique al remitente.
      </p>
      <p style="margin:8px 0 0 0;color:#3A7A5A;font-size:9px;font-family:Arial,Helvetica,sans-serif;">
        🌱 <em>Por favor, piensa en el medio ambiente antes de imprimir este contenido.</em>
      </p>
    </td>
  </tr>
</table>`;

            document.getElementById('preview').classList.remove('hidden');
            document.getElementById('signature-render').innerHTML = htmlFirma;
            document.getElementById('preview').scrollIntoView({ behavior: 'smooth' });
        }

        async function copyToClipboard() {
            const container = document.getElementById('signature-render');
            if (!container || !container.innerHTML.trim()) {
                alert('Primero debes generar la firma.');
                return;
            }

            const htmlContent = container.innerHTML;

            try {
                // Modern clipboard API (requires HTTPS)
                const blob = new Blob([htmlContent], { type: 'text/html' });
                const clipboardItem = new ClipboardItem({ 'text/html': blob });
                await navigator.clipboard.write([clipboardItem]);
                alert('¡Firma copiada! Pégala directamente en la configuración de tu cliente de correo.');
            } catch (err) {
                // Fallback: seleccionar el nodo del DOM y copiar
                try {
                    const range = document.createRange();
                    range.selectNode(container);
                    window.getSelection().removeAllRanges();
                    window.getSelection().addRange(range);
                    document.execCommand('copy');
                    window.getSelection().removeAllRanges();
                    alert('¡Firma copiada! Pégala directamente en la configuración de tu cliente de correo.');
                } catch (fallbackErr) {
                    alert('No se pudo copiar automáticamente. Selecciona la firma manualmente con Ctrl+A y luego Ctrl+C.');
                }
            }
        }

        function showStatus(msg, type) {
            const el = document.getElementById('statusMsg');
            el.textContent = msg;
            el.className = 'status-msg ' + type;
        }

        function hideStatus() {
            const el = document.getElementById('statusMsg');
            el.className = 'status-msg';
            el.textContent = '';
        }
    </script>
</body>

</html>
